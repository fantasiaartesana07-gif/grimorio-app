<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Grimorio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a3525">
    <style>
        body {
            background-color: #2c1e16;
            color: #3e2723;
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .libro {
            background-color: #f4e8d3;
            width: 100%;
            max-width: 500px;
            min-height: 90vh;
            border-radius: 5px 15px 15px 5px;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.1), 3px 3px 10px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { text-align: center; border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        input, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            background: transparent;
            border: 1px dashed #8d6e63;
            font-family: inherit;
            box-sizing: border-box;
        }
        button {
            background-color: #8d6e63;
            color: #f4e8d3;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
        }
        .hechizo {
            border-top: 1px solid #8d6e63;
            margin-top: 20px;
            padding-top: 10px;
        }
        .hechizo img {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="libro">
        <h1>Mi Grimorio</h1>
        
        <input type="text" id="titulo" placeholder="Nombre del Hechizo">
        <textarea id="descripcion" rows="4" placeholder="Ingredientes y conjuro..."></textarea>
        <input type="file" id="imagen" accept="image/*">
        <button onclick="guardarHechizo()">Añadir al Grimorio</button>

        <div id="lista-hechizos"></div>
    </div>

    <script>
        // Registrar Service Worker para instalación
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Lógica para guardar y mostrar hechizos
        function guardarHechizo() {
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;
            const archivoImagen = document.getElementById('imagen').files[0];

            if (!titulo || !descripcion) {
                alert("Necesitas un título y una descripción.");
                return;
            }

            if (archivoImagen) {
                const lector = new FileReader();
                lector.onload = function(e) {
                    guardarEnMemoria(titulo, descripcion, e.target.result);
                };
                lector.readAsDataURL(archivoImagen);
            } else {
                guardarEnMemoria(titulo, descripcion, null);
            }
        }

        function guardarEnMemoria(titulo, descripcion, imagenBase64) {
            let hechizos = JSON.parse(localStorage.getItem('hechizos')) || [];
            hechizos.push({ titulo, descripcion, imagenBase64 });
            localStorage.setItem('hechizos', JSON.stringify(hechizos));
            
            // Limpiar formulario y recargar
            document.getElementById('titulo').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('imagen').value = '';
            mostrarHechizos();
        }

        function mostrarHechizos() {
            const contenedor = document.getElementById('lista-hechizos');
            contenedor.innerHTML = '';
            let hechizos = JSON.parse(localStorage.getItem('hechizos')) || [];

            hechizos.forEach(h => {
                let div = document.createElement('div');
                div.className = 'hechizo';
                div.innerHTML = `<h3>${h.titulo}</h3><p>${h.descripcion}</p>`;
                if (h.imagenBase64) {
                    div.innerHTML += `<img src="${h.imagenBase64}" alt="Imagen del hechizo">`;
                }
                contenedor.appendChild(div);
            });
        }

        // Cargar hechizos al abrir la app
        mostrarHechizos();
    </script>
</body>
</html>
